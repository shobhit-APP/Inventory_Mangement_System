# Application Name
spring.application.name=StockStick
# Database Setting
# 1.Database Url
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:shobhitdatabase}
# 2.DriverClassName
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# 3.To Show sql Queries by Hibernate
spring.jpa.show-sql=true
# 4.To Auto Update The DataBase By Hibernate
spring.jpa.hibernate.ddl-auto=update
# 5.To On The Sql Initialization Mode of sql
spring.sql.init.mode=always
# 6.Database UserName
spring.datasource.username=root
# 7.Password

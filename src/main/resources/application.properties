# Application Name
spring.application.name=StockStick
# Database Setting
# 1.Database Url
# 1.Database Url
# 2.DriverClassName
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# 3.To Show sql Queries by Hibernate
spring.jpa.show-sql=true
# 4.To Auto Update The DataBase By Hibernate
spring.jpa.hibernate.ddl-auto=update
# 5.To On The Sql Initialization Mode of sql
spring.sql.init.mode=always
spring.datasource.url=${DB_URL}
spring.datasource.username=java121
spring.datasource.password=${DB_PASSWORD}



# Hibernate settings
spring.jpa.defer-datasource-initialization=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# Thymeleaf configuration
spring.mvc.static-path-pattern=/static/**
spring.resources.static-locations=classpath:/static/
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=false
spring.thymeleaf.check-template-location=true

# Contact Us Setting

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

server.error.path=/app/error
